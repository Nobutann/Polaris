spring:
  application:
    name: sebrae

  datasource:
    url: jdbc:postgresql://localhost:5432/sebrae
    username: admin
    password: admin

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    url: jdbc:postgresql://localhost:5432/sebrae
    user: admin
    password: admin

logging:
    level:
      org:
       flywaydb: DEBUG